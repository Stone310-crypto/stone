# ─────────────────────────────────────────────────────────────────────────────
# Stone Node Deployment Config
#
# Jeder [[node]] Block ist ein Server, zu dem deployed wird.
#
# Feld "network": mainnet | testnet | both (default: both)
#   - mainnet  → nur bei --mainnet Deploy
#   - testnet  → nur bei --testnet Deploy
#   - both     → bei beiden (shared Binary, 2 Services auf einem Server)
# ─────────────────────────────────────────────────────────────────────────────

# ── Testnet Nodes ─────────────────────────────────────────────────────────────

[[node]]
name    = "server1"
host    = "100.90.28.68"
user    = "root"
port    = "22"
root    = "/opt/stone-node"
path    = "/opt/stone-node/target/release"
service = "stone-node"
bins    = "stone-setup stone-master"
network = "testnet"

[[node]]
name    = "VPSServer-testnet"
host    = "212.227.54.241"
user    = "root"
port    = "22"
root    = "/home"
path    = "/home"
service = "stone-node"
bins    = "stone-setup stone-master"
network = "testnet"

[[node]]
name    = "VPS2-testnet"
