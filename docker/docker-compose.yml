# ─────────────────────────────────────────────────────────────────────────────
# Stone Network – Docker Compose
#
# Standard:  1 Node  →  docker-compose -f docker/docker-compose.yml up --build
# Cluster:   3 Nodes →  docker-compose -f docker/docker-compose.yml --profile cluster up --build
#
# Dashboard: http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Haupt-Node (startet immer) ─────────────────────────────────────────────
  node:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stone-node
    hostname: stone-node
    ports:
      - "8080:8080"
      - "4001:4001"      # P2P TCP
      - "4001:4001/udp"  # P2P QUIC (UDP)
    environment:
      STONE_NODE_NAME: "stone-node"
      STONE_PASSWORD: "TestPasswort1!"
      STONE_STORAGE_GB: "50"
      STONE_HTTP_PORT: "8080"
      STONE_P2P_PORT: "4001"
      # Bootstrap zuerst zum VPS (öffentliche IPv4), dann IPv6-Server
      STONE_SEED_PEERS: "/ip4/212.227.54.241/tcp/4001/p2p/12D3KooWAq975k49YZiCdaf3V96iJtU9fxqmoGRZW3e3Ceupv17k,/ip4/212.227.54.241/udp/4001/quic-v1/p2p/12D3KooWAq975k49YZiCdaf3V96iJtU9fxqmoGRZW3e3Ceupv17k"
      # STONE_ADMIN_KEY: "" # Optional: separater Admin-Key
    volumes:
      - node_data:/opt/stone-node/stone_data
    networks:
      - stonenet
    restart: unless-stopped

volumes:
  node_data:

networks:
  stonenet:
    driver: bridge
