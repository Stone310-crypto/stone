# ─────────────────────────────────────────────────────────────────────────────
# Stone Network – Docker Compose
#
# Testnet:   docker-compose -f docker/docker-compose.yml up --build node-testnet
# Mainnet:   docker-compose -f docker/docker-compose.yml up --build node-mainnet
# Beide:     docker-compose -f docker/docker-compose.yml up --build
#
# Testnet Dashboard: http://localhost:8080
# Mainnet Dashboard: http://localhost:8180
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── TURN/STUN Server (Coturn — NAT-Traversal für WebRTC) ────────────────────
  turn:
    image: coturn/coturn:4.6
    container_name: stone-turn
    restart: unless-stopped
    network_mode: host  # Coturn braucht direkten Netzwerkzugriff für Port-Mapping
    environment:
      - TURN_USER=stone:turn_stone_testnet_2024
      - TURN_REALM=stonechain.network
      - TURN_EXTERNAL_IP=auto
    ports:
      - "3478:3478"           # STUN/TURN TCP
      - "3478:3478/udp"       # STUN/TURN UDP
      - "5349:5349"           # TURN TCP/TLS
      - "5349:5349/udp"       # TURN UDP/TLS
      - "49152-65535:49152-65535/udp"  # Relay Ports
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: >
      turnserver 
      --log-file=stdout 
      --lt-cred-mech 
      --user=stone:turn_stone_testnet_2024 
      --realm=stonechain.network 
      --no-tls 
      --no-dtls 
      --listening-port=3478 
      --min-port=49152 
      --max-port=49162 
      --verbose

  # ── Testnet Node ────────────────────────────────────────────────────────────
  node-testnet:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stone-testnet
    hostname: stone-testnet
    ports:
      - "8080:8080"
      - "4001:4001"      # P2P TCP (Testnet)
      - "4001:4001/udp"  # P2P QUIC (Testnet)
    environment:
      STONE_NETWORK: "testnet"
      STONE_NODE_NAME: "stone-testnet"
      STONE_PASSWORD: "TestPasswort1!"
      STONE_STORAGE_GB: "50"
      STONE_HTTP_PORT: "8080"
      STONE_P2P_PORT: "4001"
      STONE_SEED_PEERS: "/ip4/212.227.54.241/tcp/4001/p2p/12D3KooWNz9GTNsFks567mHaQLKR4Ai6MCiw5WUDWAgvny1ow4tJ,/ip4/212.227.54.241/udp/4001/quic-v1/p2p/12D3KooWNz9GTNsFks567mHaQLKR4Ai6MCiw5WUDWAgvny1ow4tJ"
      NOMAD_URL: "https://chain.unrooted.dev"
      NODE_SECRET: "${NODE_SECRET:-}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
    volumes:
      - testnet_data:/opt/stone-node/stone_data
    networks:
      - stonenet
    restart: unless-stopped

  # ── Mainnet Node ────────────────────────────────────────────────────────────
  node-mainnet:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stone-mainnet
    hostname: stone-mainnet
    ports:
      - "8180:8180"
      - "5001:5001"      # P2P TCP (Mainnet)
      - "5001:5001/udp"  # P2P QUIC (Mainnet)
    environment:
      STONE_NETWORK: "mainnet"
      STONE_NODE_NAME: "stone-mainnet"
      STONE_PASSWORD: "TestPasswort1!"
      STONE_STORAGE_GB: "50"
      STONE_HTTP_PORT: "8180"
      STONE_P2P_PORT: "5001"
      STONE_SEED_PEERS: "/ip4/212.227.54.241/tcp/5001/p2p/12D3KooWNz9GTNsFks567mHaQLKR4Ai6MCiw5WUDWAgvny1ow4tJ,/ip4/212.227.54.241/udp/5001/quic-v1/p2p/12D3KooWNz9GTNsFks567mHaQLKR4Ai6MCiw5WUDWAgvny1ow4tJ"
      NOMAD_URL: "https://chain.unrooted.dev"
      NODE_SECRET: "${NODE_SECRET:-}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
    volumes:
      - mainnet_data:/opt/stone-node/stone_data_mainnet
    networks:
      - stonenet
    restart: unless-stopped

volumes:
  testnet_data:
  mainnet_data:

networks:
  stonenet:
    driver: bridge
