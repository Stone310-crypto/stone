name: Build Dashboard + Node Binaries (macOS + Windows)
on:
  push:
    branches: [main, master]
    paths:
      - 'dashboard/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'dashboard/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build Node Binaries (stone-app-node, stone-master) ──────────────────────
  build-node-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_suffix: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build stone-app-node (${{ matrix.target }})
        run: cargo build --release --bin stone-app-node --target ${{ matrix.target }}

      - name: Build stone-master (${{ matrix.target }})
        run: cargo build --release --bin stone-master --target ${{ matrix.target }}

      - name: Prepare asset names
        shell: bash
        run: |
          echo "NODE_ASSET=stone-app-node-${{ matrix.asset_suffix }}" >> $GITHUB_ENV
          echo "NODE_SHA=stone-app-node-${{ matrix.asset_suffix }}.sha256" >> $GITHUB_ENV
          echo "MASTER_ASSET=stone-master-${{ matrix.asset_suffix }}" >> $GITHUB_ENV
          echo "MASTER_SHA=stone-master-${{ matrix.asset_suffix }}.sha256" >> $GITHUB_ENV

      # On Windows, the actual binary has .exe extension — we strip it for the asset name
      - name: Rename binaries (standardize asset names)
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ -f stone-app-node.exe ]; then cp stone-app-node.exe "$NODE_ASSET"; else cp stone-app-node "$NODE_ASSET"; fi
          if [ -f stone-master.exe ]; then cp stone-master.exe "$MASTER_ASSET"; else cp stone-master "$MASTER_ASSET"; fi

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "$(uname)" = "Darwin" ]; then
            shasum -a 256 "$NODE_ASSET" | awk '{print $1}' > "$NODE_SHA"
            shasum -a 256 "$MASTER_ASSET" | awk '{print $1}' > "$MASTER_SHA"
          else
            sha256sum "$NODE_ASSET" | awk '{print $1}' > "$NODE_SHA"
            sha256sum "$MASTER_ASSET" | awk '{print $1}' > "$MASTER_SHA"
          fi

      - name: Upload node binary artifact (${{ matrix.asset_suffix }})
        uses: actions/upload-artifact@v4
        with:
          name: node-binaries-${{ matrix.asset_suffix }}
          path: |
            target/${{ matrix.target }}/release/${{ env.NODE_ASSET }}
            target/${{ matrix.target }}/release/${{ env.NODE_SHA }}
            target/${{ matrix.target }}/release/${{ env.MASTER_ASSET }}
            target/${{ matrix.target }}/release/${{ env.MASTER_SHA }}

  # ─── macOS Dashboard (.dmg) ────────────────────────────────────────────────
  build-dashboard-macos:
    needs: build-node-binaries
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Build Tauri (macOS ${{ matrix.target }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: dashboard
          args: --target ${{ matrix.target }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stone-Dashboard-macOS-${{ matrix.target }}
          path: |
            dashboard/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            dashboard/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

  # ─── Windows Dashboard (.msi + .exe) ───────────────────────────────────────
  build-dashboard-windows:
    needs: build-node-binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Build Tauri (Windows x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: dashboard
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stone-Dashboard-Windows-x86_64
          path: |
            dashboard/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            dashboard/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe