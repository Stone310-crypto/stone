name: Build Dashboard (macOS + Windows)
on:
  push:
    branches: [main, master]
    paths:
      - 'dashboard/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

jobs:
  # ─── macOS (aarch64 + x86_64) ─────────────────────────────────────────
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Build Tauri (macOS ${{ matrix.target }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: dashboard
          args: --target ${{ matrix.target }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stone-Dashboard-macOS-${{ matrix.target }}
          path: |
            dashboard/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            dashboard/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

  # ─── Windows (x86_64) ─────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install WebView2 (preinstalled on windows-latest)
        run: echo "WebView2 ready"

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci

      - name: Build Tauri (Windows x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: dashboard
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stone-Dashboard-Windows-x86_64
          path: |
            dashboard/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            dashboard/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe